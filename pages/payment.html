<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment — Sure Travel Agency</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../images/logo.jpeg" />
  <!-- Auto-redirect to booking page -->
  <meta http-equiv="refresh" content="0; url=booking.html" />
</head>
<body>
<p style="text-align:center;padding:60px;font-family:sans-serif;">Redirecting to <a href="booking.html">Booking & Payment</a>...</p>
<script>window.location.href = 'booking.html';</script>

<!-- AI CHAT WIDGET -->
<button id="ai-chat-toggle" aria-label="Open AI Assistant" aria-expanded="false" style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#2563eb;color:white;font-size:1.5rem;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,0.45);z-index:9998;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;">✈</button>
<div id="ai-chat-widget" style="display:none;">
  <div class="ai-chat-header">
    <div class="ai-avatar">✈</div>
    <div>
      <h4 data-translate="ai_title">Sure Travel AI</h4>
      <p data-translate="ai_status">Online · Replies fast</p>
    </div>
    <button class="ai-chat-close" id="ai-chat-close" type="button" aria-label="Close">✕</button>
  </div>
  <div id="ai-chat-messages"></div>
  <div id="ai-quick-chips" class="quick-replies"></div>
  <div class="ai-chat-input-row">
    <input type="text" id="ai-chat-input" data-translate-placeholder="ai_placeholder" placeholder="Ask about flights, hotels, payments..." autocomplete="off" />
    <button id="ai-chat-send" type="button">&#10148;</button>
  </div>
</div>

<script src="../js/translations.js"></script>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script src="../js/ai-assistant.js"></script>
</body>
</html>
